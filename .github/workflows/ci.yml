name: SlashSure CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: slashsure_test
          POSTGRES_USER: slashsure
          POSTGRES_PASSWORD: slashsure_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run linter
        run: poetry run ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://slashsure:slashsure_pass@localhost:5432/slashsure_test
          DATABASE_SYNC_URL: postgresql://slashsure:slashsure_pass@localhost:5432/slashsure_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key_32_characters_xx
          JWT_SECRET_KEY: test_jwt_key_64_characters_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          WALLET_MASTER_KEY: test_wallet_master_key_32_chars_
          GENLAYER_RPC_URL: https://studio.genlayer.com:8443/api
          ALLOWED_ORIGINS: http://localhost:3000
        run: poetry run pytest tests/ -v --cov=app --cov-report=xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://slashsure-backend.fly.dev
          NEXT_PUBLIC_WS_URL: wss://slashsure-backend.fly.dev

  deploy-backend:
    name: Deploy Backend to Fly.io
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config infrastructure/fly/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
