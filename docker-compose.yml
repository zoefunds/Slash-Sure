version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: slashsure_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: slashsure
      POSTGRES_USER: slashsure
      POSTGRES_PASSWORD: slashsure_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slashsure"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slashsure_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: slashsure_backend
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://slashsure:slashsure_pass@postgres:5432/slashsure
      DATABASE_SYNC_URL: postgresql://slashsure:slashsure_pass@postgres:5432/slashsure
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
